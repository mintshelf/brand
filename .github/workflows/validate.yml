name: Validate brand kit

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Validate approved public surface
        shell: bash
        run: |
          set -euo pipefail
          node scripts/validate-tokens.mjs
          test -f LICENSE.md
          test -f assets/app-icon.png
          test -f assets/marks/mark-green.svg
          test -f assets/marks/mark-green.png
          test -f assets/marks/mark-black.png
          test -f assets/marks/mark-white.png
          if grep -RIE '(BEGIN (RSA|OPENSSH|EC) PRIVATE KEY|ghp_[A-Za-z0-9]{20,}|sk_live_[A-Za-z0-9]+)' . --exclude-dir=.git; then
            echo 'Possible secret found.'
            exit 1
          fi
