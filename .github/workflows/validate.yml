name: Validate brand kit

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate approved public surface
        shell: bash
        run: |
          set -euo pipefail
          jq empty tokens/*.json
          test -f PRESS_USE.md
          test -f assets/logos/mintshelf-black.png
          test -f assets/logos/mintshelf-white.png
          if grep -RIE '(BEGIN (RSA|OPENSSH|EC) PRIVATE KEY|ghp_[A-Za-z0-9]{20,}|sk_live_[A-Za-z0-9]+)' . --exclude-dir=.git; then
            echo 'Possible secret found.'
            exit 1
          fi

